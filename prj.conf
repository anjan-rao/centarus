# Fundamental Hardware Support
CONFIG_GPIO=y
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_UART_LINE_CTRL=y

# Enable Logging
# Enable the logging subsystem
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y  # Buffers logs to avoid blocking threads
# 3 = Info, 4 = Debug
CONFIG_LOG_DEFAULT_LEVEL=3

# Base Modbus configuration
CONFIG_MODBUS=y
CONFIG_MODBUS_SERIAL=y

CONFIG_MAIN_STACK_SIZE=1024

# Flash and QSPI drivers
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FCB=y
# This is crucial for the flash_area_write function
CONFIG_FLASH_PAGE_LAYOUT=y